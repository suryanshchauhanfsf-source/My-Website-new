    <style>
        body { font-family: 'Inter', sans-serif; }

        .blob { position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0; }
        .blob-1 { width:500px;height:500px;background:rgba(139,28,217,0.2);top:-100px;left:50%;transform:translateX(-50%); }
        .blob-2 { width:350px;height:350px;background:rgba(88,28,135,0.14);bottom:60px;left:-60px; }

        .thankyou-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .check-ring {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 2px solid rgba(168,85,247,0.5);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 2rem;
            background: rgba(88,28,135,0.15);
            box-shadow: 0 0 40px rgba(168,85,247,0.25),
                        inset 0 0 20px rgba(168,85,247,0.1);
            animation: popIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        .check-ring svg {
            width: 40px; height: 40px;
            animation: drawCheck 0.5s 0.3s ease both;
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        @keyframes popIn {
            from { opacity:0; transform: scale(0.5); }
            to   { opacity:1; transform: scale(1); }
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 35%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: fadeUp 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
        }

        p {
            font-size: 1.05rem;
            color: rgba(231,231,231,0.6);
            max-width: 38ch;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            animation: fadeUp 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
        }

        .btn-back {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: 1px solid rgba(168,85,247,0.4);
            background: rgba(88,28,135,0.18);
            color: #c084fc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(168,85,247,0.15);
            animation: fadeUp 0.6s 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }

        .btn-back:hover {
            background: rgba(88,28,135,0.35);
            border-color: rgba(192,132,252,0.7);
            box-shadow: 0 0 35px rgba(168,85,247,0.3);
            gap: 0.75rem;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* auto-redirect countdown */
        #countdown {
            font-size: 0.78rem;
            color: rgba(231,231,231,0.35);
            margin-top: 1.5rem;
            animation: fadeUp 0.6s 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
    </style>
</head>
<body>

    <!-- Custom cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <img class="image-gradient" src="gradient.png" alt="">

    <header>
        <h1 class="logo">SURYANSH</h1>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="work.html" class="nav-link">Work</a>
            <a href="contact.html" class="nav-link" style="color:#fff;">Contact</a>
                    <a href="files.html" class="nav-link">Files</a>
        </nav>
        <button class="btn-signin">SIGN UP</button>
    </header>

    <div class="thankyou-wrap">
        <div class="check-ring">
            <svg viewBox="0 0 50 50" fill="none" stroke="#c084fc" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="12,26 22,36 38,18"/>
            </svg>
        </div>

        <h1>Message Received!</h1>
        <p>Thanks for reaching out. I'll read your message and get back to you within 24 hours.</p>

        <a href="contact.html" class="btn-back">← Back to Contact</a>
        <p id="countdown">Redirecting in <span id="secs">8</span>s…</p>
    </div>

    <script>
        // Cursor
        const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
        let mx=-100,my=-100,rx=-100,ry=-100;
        document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.transform=`translate(${mx}px,${my}px)`;});
        document.addEventListener('mouseover',e=>{if(e.target.closest('a,button'))ring.classList.add('ring-hover');});
        document.addEventListener('mouseout',e=>{if(e.target.closest('a,button'))ring.classList.remove('ring-hover');});
        document.addEventListener('mousedown',()=>ring.classList.add('ring-click'));
        document.addEventListener('mouseup',()=>ring.classList.remove('ring-click'));
        document.addEventListener('mouseleave',()=>{dot.style.opacity='0';ring.style.opacity='0';});
        document.addEventListener('mouseenter',()=>{dot.style.opacity='1';ring.style.opacity='1';});
        (function l(){rx+=(mx-rx)*0.11;ry+=(my-ry)*0.11;ring.style.transform=`translate(${rx}px,${ry}px)`;requestAnimationFrame(l);})();

        // Auto-redirect countdown
        let s = 8;
        const secsEl = document.getElementById('secs');
        const timer = setInterval(() => {
            s--;
            secsEl.textContent = s;
            if (s <= 0) { clearInterval(timer); window.location.href = 'index.html'; }
        }, 1000);
    </script>
</body>
